<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07070d" />
  <title>Aether Sand — Falling Sand Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Simulation canvas stack -->
  <div id="stage">
    <canvas id="sim"></canvas>
    <canvas id="glow"></canvas>
    <div id="vignette"></div>
    <div id="cursor-ring"></div>
  </div>

  <!-- Top brand bar -->
  <header id="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="brand-text">
        <h1>Aether&nbsp;Sand</h1>
        <p>a living particle playground</p>
      </div>
    </div>
    <div class="stats" id="stats">
      <div class="stat"><span class="stat-val" id="fps">60</span><span class="stat-label">fps</span></div>
      <div class="stat"><span class="stat-val" id="count">0</span><span class="stat-label">particles</span></div>
    </div>
  </header>

  <!-- Material palette -->
  <aside id="palette" class="panel">
    <div class="palette-head">
      <div class="panel-title">Materials</div>
      <button class="palette-book" id="btn-book" title="Alchemy book (B)" aria-label="Open alchemy book">
        <svg viewBox="0 0 24 24"><path d="M6 4h12a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V6a2 2 0 0 1 2-2z"/></svg>
      </button>
    </div>
    <div class="palette-search">
      <svg class="search-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 1 0 3.9 10.6l4.2 4.2 1.4-1.4-4.2-4.2A6 6 0 0 0 10 4zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/></svg>
      <input id="mat-search" type="text" placeholder="Search materials…" autocomplete="off" spellcheck="false" />
      <button id="mat-search-clear" class="search-clear" type="button" aria-label="Clear search">×</button>
    </div>
    <div class="palette-tabs" id="palette-tabs"></div>
    <div id="material-grid-wrap"></div>
    <div class="palette-desc" id="mat-desc">
      <span class="mat-desc-name"></span>
      <span class="mat-desc-text"></span>
    </div>
  </aside>

  <!-- Forces + scene panel -->
  <aside id="sidepanel" class="panel">
    <div class="panel-title">Forces</div>

    <div class="field">
      <span class="field-label">Gravity</span>
      <div class="compass" id="compass">
        <button class="cmp" data-gx="0"  data-gy="-1" title="Gravity up">↑</button>
        <button class="cmp" data-gx="-1" data-gy="0"  title="Gravity left">←</button>
        <button class="cmp cmp-zero" data-gx="0" data-gy="0" title="Zero-G">○</button>
        <button class="cmp" data-gx="1"  data-gy="0"  title="Gravity right">→</button>
        <button class="cmp active" data-gx="0" data-gy="1" title="Gravity down">↓</button>
      </div>
    </div>

    <div class="field">
      <span class="field-label">Wind <em id="wind-readout">0</em></span>
      <input type="range" id="wind" min="-100" max="100" value="0" />
    </div>

    <div class="field">
      <span class="field-label">Light <em id="light-readout">72</em>%</span>
      <input type="range" id="light" min="0" max="100" value="72" title="Bloom + dynamic lighting intensity" />
    </div>

    <div class="panel-title" style="margin-top:6px">Scene</div>
    <div class="btn-col">
      <button class="mini on" id="btn-light" title="Toggle lighting (L)">
        <svg viewBox="0 0 24 24"><path d="M12 3a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19.93 11H21a1 1 0 0 1 0 2h-1.07A7 7 0 0 1 13 19.93V21a1 1 0 0 1-2 0v-1.07A7 7 0 0 1 4.07 13H3a1 1 0 0 1 0-2h1.07A7 7 0 0 1 11 5.07V4a1 1 0 0 1 1-1z"/></svg>
        <span>Light&nbsp;on</span>
      </button>
      <button class="mini" id="btn-heat" title="Toggle heat-map (H)">
        <svg viewBox="0 0 24 24"><path d="M12 2s5 5 5 10a5 5 0 0 1-10 0c0-2 1-3 1-3s-1 4 2 4 2-4 2-4 0-4-2-7z"/></svg>
        <span>Heat&nbsp;map</span>
      </button>
      <button class="mini" id="btn-snap" title="Download a PNG snapshot">
        <svg viewBox="0 0 24 24"><path d="M9 4l-1 2H4v14h16V6h-4l-1-2H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"/></svg>
        <span>Snapshot</span>
      </button>
      <div class="btn-row">
        <button class="mini" id="btn-save" title="Save scene">Save</button>
        <button class="mini" id="btn-load" title="Load saved scene">Load</button>
      </div>
    </div>
  </aside>

  <!-- Control dock -->
  <nav id="dock" class="panel">
    <div class="dock-group">
      <button class="ctrl" id="btn-play" title="Play / Pause (Space)">
        <svg viewBox="0 0 24 24" class="ic-pause"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
        <svg viewBox="0 0 24 24" class="ic-play"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl" id="btn-step" title="Step one frame (→)">
        <svg viewBox="0 0 24 24"><path d="M7 5v14l9-7zM17 5h2v14h-2z"/></svg>
      </button>
    </div>

    <div class="dock-divider"></div>

    <div class="dock-group brush-group">
      <span class="dock-label">Brush</span>
      <input type="range" id="brush" min="1" max="48" value="10" />
      <span class="dock-readout" id="brush-readout">10</span>
    </div>

    <div class="dock-divider"></div>

    <div class="dock-group">
      <button class="ctrl ctrl-text" id="btn-clear" title="Clear (C)">
        <svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7L6 7zm3-3h6l1 2H8l1-2z"/></svg>
        <span>Clear</span>
      </button>
    </div>
  </nav>

  <!-- First-run hint -->
  <div id="hint">
    <kbd>Click + drag</kbd> to pour · <kbd>Right-click</kbd> to erase · <kbd>Space</kbd> pause · <kbd>B</kbd> alchemy book
  </div>

  <!-- Alchemy booklet -->
  <div id="booklet" class="booklet hidden" aria-hidden="true">
    <div class="booklet-backdrop" id="booklet-backdrop"></div>
    <div class="booklet-panel panel">
      <header class="booklet-head">
        <div class="booklet-head-text">
          <h2>Alchemy Book</h2>
          <p id="discover-count">0 discovered</p>
          <div class="booklet-progress"><span id="discover-bar"></span></div>
        </div>
        <button class="booklet-close" id="btn-book-close" aria-label="Close book">×</button>
      </header>
      <div class="booklet-tabs">
        <button class="btab active" data-tab="recipes">Recipes</button>
        <button class="btab" data-tab="materials">Materials</button>
      </div>
      <div class="booklet-body" id="booklet-recipes"></div>
      <div class="booklet-body hidden" id="booklet-materials"></div>
      <footer class="booklet-foot">
        <label class="reveal-toggle">
          <input type="checkbox" id="reveal-all" />
          <span>Reveal all recipes (sandbox mode)</span>
        </label>
      </footer>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
